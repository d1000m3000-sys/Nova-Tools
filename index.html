<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Tools X</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>Nova Tools X 🔥</header>

<div class="stats">
🔥 سلسلة الاستخدام: <span id="streak">0</span> يوم
</div>

<div class="container">
  <div class="card" onclick="show('currency')">💱 تحويل العملات</div>
  <div class="card" onclick="show('calc')">🧮 آلة حاسبة</div>
  <div class="card" onclick="show('notes')">📝 ملاحظات</div>
  <div class="card" onclick="show('time')">⏰ الوقت</div>
  <div class="card" onclick="show('todo')">✅ مهامي</div>
</div>

<div id="tool"></div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
